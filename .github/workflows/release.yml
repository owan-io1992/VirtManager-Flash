name: Build and Release Tauri App

on:
  push:
    tags:
      - "V[0-9]+.[0-9]+.[0-9]+"
      - "V[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate version matches tag
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ ! "$TAG_NAME" =~ ^V([0-9]+\.[0-9]+\.[0-9]+)(-rc[0-9]+)?$ ]]; then
            echo "Error: Tag $TAG_NAME does not follow SemVer pattern V<x.x.x> or V<x.x.x>-rc<n>"
            exit 1
          fi
          TAG_VERSION="${BASH_REMATCH[1]}"
          PACKAGE_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $PACKAGE_VERSION matches tag's SemVer version: $TAG_VERSION"

  build:
    needs: validate
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-26.04
          - arch: arm64
            runs-on: ubuntu-26.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libdbus-1-dev libvirt-dev jq unzip xdg-utils
      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Build application
        run: |
          # Use mise run build as requested
          mise run build
          # Rename/copy the built AppImage to a standard filename for easy publishing
          cp src-tauri/target/release/bundle/appimage/VirtManager-Flash_*.AppImage ./VirtManager-Flash_${{ matrix.arch }}.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: AppImage-${{ matrix.arch }}
          path: VirtManager-Flash_${{ matrix.arch }}.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - name: Determine pre-release status
        id: check-prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -rc ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./VirtManager-Flash_amd64.AppImage
            ./VirtManager-Flash_arm64.AppImage
          prerelease: ${{ steps.check-prerelease.outputs.prerelease }}
          generate_release_notes: true
