name: Build and Release Tauri App

on:
  push:
    tags:
      - "V[0-9]+.[0-9]+.[0-9]+"
      - "V[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate version matches tag
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ ! "$TAG_NAME" =~ ^V([0-9]+\.[0-9]+\.[0-9]+)(-rc[0-9]+)?$ ]]; then
            echo "Error: Tag $TAG_NAME does not follow SemVer pattern V<x.x.x> or V<x.x.x>-rc<n>"
            exit 1
          fi
          TAG_VERSION="${BASH_REMATCH[1]}"
          PACKAGE_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $PACKAGE_VERSION matches tag's SemVer version: $TAG_VERSION"

  build:
    needs: validate
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-22.04
            os_label: ubuntu22
          - arch: arm64
            runs-on: ubuntu-22.04-arm
            os_label: ubuntu22
          - arch: amd64
            runs-on: ubuntu-24.04
            os_label: ubuntu24
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            os_label: ubuntu24
          - arch: amd64
            runs-on: ubuntu-26.04
            os_label: ubuntu26
          - arch: arm64
            runs-on: ubuntu-26.04-arm
            os_label: ubuntu26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            dist
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"


      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libdbus-1-dev libvirt-dev jq unzip xdg-utils
      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Build application
        run: |
          # Use mise run build as requested
          mise run build

          # Locate the built AppImage
          BUILT_APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "VirtManager-Flash_*.AppImage" | head -n 1)
          if [ -z "$BUILT_APPIMAGE" ]; then
            echo "Error: Built AppImage not found!"
            exit 1
          fi

          # WebKitGTK EGL startup crash fix (EGL_BAD_PARAMETER):
          # linuxdeploy automatically bundles the build system's libwayland client libraries.
          # At runtime, these bundled libraries conflict with the host's native graphics drivers (Mesa/NVIDIA).
          # We extract the AppImage, delete these bundled wayland libraries (forcing the app to use
          # the host's native ones), and then repackage the AppImage.
          echo "Extracting $BUILT_APPIMAGE..."
          chmod +x "$BUILT_APPIMAGE"
          "$BUILT_APPIMAGE" --appimage-extract

          echo "Removing problematic bundled Wayland client libraries..."
          rm -f squashfs-root/usr/lib/libwayland-client.so*
          rm -f squashfs-root/usr/lib/libwayland-egl.so*
          rm -f squashfs-root/usr/lib/libwayland-server.so*
          rm -f squashfs-root/usr/lib/libwayland-cursor.so*

          echo "Downloading appimagetool..."
          ARCH_NAME=$(uname -m)
          if [ "$ARCH_NAME" = "x86_64" ]; then
            APPIMAGE_ARCH="x86_64"
            RUN_ARCH="x86_64"
          elif [ "$ARCH_NAME" = "aarch64" ]; then
            APPIMAGE_ARCH="aarch64"
            RUN_ARCH="aarch64"
          else
            APPIMAGE_ARCH="$ARCH_NAME"
            RUN_ARCH="$ARCH_NAME"
          fi
          
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${APPIMAGE_ARCH}.AppImage"
          chmod +x appimagetool

          echo "Repackaging AppImage..."
          export APPIMAGE_EXTRACT_AND_RUN=1
          ARCH=$RUN_ARCH ./appimagetool squashfs-root/ ./VirtManager-Flash_${{ matrix.os_label }}_${{ matrix.arch }}.AppImage


      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: AppImage-${{ matrix.os_label }}-${{ matrix.arch }}
          path: VirtManager-Flash_${{ matrix.os_label }}_${{ matrix.arch }}.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - name: Determine pre-release status
        id: check-prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -rc ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./VirtManager-Flash_*_amd64.AppImage
            ./VirtManager-Flash_*_arm64.AppImage
          prerelease: ${{ steps.check-prerelease.outputs.prerelease }}
          generate_release_notes: true
